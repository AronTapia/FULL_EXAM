spring.application.name=citaMedica

server.port=8087

#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.service-url.defaultZone=http://eureka:eureka@localhost:8761/eureka/

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/citaMedica
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=una_clave_secreta_larga_y_segura_de_al_menos_32_bytes

eureka.instance.prefer-ip-address=true